    <script>
        let avatarSrc = localStorage.getItem('uAvatar') || "https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png";
        
        function selectAvatar(el) {
            document.querySelectorAll('.avatar-option').forEach(img => img.classList.remove('selected'));
            el.classList.add('selected');
            avatarSrc = el.src;
        }

        function saveUser() {
            const name = document.getElementById('regName').value;
            const pass = document.getElementById('regPass').value;
            if(!name || !pass) return alert("नाम और पासवर्ड ज़रूरी है!");
            localStorage.setItem('uName', name);
            localStorage.setItem('uPass', pass);
            localStorage.setItem('uAvatar', avatarSrc);
            showProfileScreen();
        }

        function showProfileScreen() {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('profileScreen').style.display = 'flex';
            document.getElementById('displayName').innerText = localStorage.getItem('uName');
            document.getElementById('displayAvatar').src = localStorage.getItem('uAvatar');
            document.getElementById('userNavAvatar').src = localStorage.getItem('uAvatar');
        }

        function askPassword() {
            const p = prompt("पासवर्ड डालें:");
            if(p === localStorage.getItem('uPass')) {
                document.getElementById('profileScreen').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                triggerOTTAnimation('NETZLIX', '#E50914');
            } else alert("गलत पासवर्ड!");
        }

        const ottConfigs = {
            netflix: '17xeiQGg_k8u-O50NA2dceMXATAkV0Qc8X6y4BTOyYdc',
            prime: '1uBJmCFVlWkNCu8KAg5-wzi_dKs67e3SrTSYqvMsb3IU',
            zee5: '17Fxjdvi8Hao8oy4qOiQiCg9ebXRA4OBb2KiRwTcml84',
            crunchy: '1i3thy-hRD_WFsJmfNDDSKg1PFQ3gluSBVBRGJ2TTryc',
            disney: '1wE0OHzpIBVBu2VsqNGzyeMCxoiL6iCDbrsvxoBccDxM',
            apple: '1skE6N4bvQLbqr7LEKEYIWGMKhME97uUmxRWk4OjCteo'
        };

        let currentSheetId = ottConfigs.netflix;
        let movies = [], favorites = JSON.parse(localStorage.getItem('favs')) || [];
        let continueWatching = JSON.parse(localStorage.getItem('cw')) || [];
        let displayLimit = 30, currentTag = 'Home', currentMovie = null;

        const genreMaster = ["Home", "Favorites", "Movies", "TV Shows", "Action", "Adventure", "Anime", "Comedy", "Horror", "Sci-Fi", "Thriller", "Hindi", "English", "Dubbed", "Marvel", "DC", "South Indian", "Korean Drama", "Web Series", "Trending", "New Release", "Classic", "Supernatural", "Vampire", "Zombie", "Martial Arts", "Cyberpunk", "Space", "Time Travel", "Survival", "Heist", "Police", "Medical", "Political", "Teen", "Adult", "Kids", "Originals", "Short Film", "Indie", "Slasher", "Gore", "Cult", "Epic", "Spy", "Assassin", "Dark Comedy", "Post-Apocalyptic", "Monster", "Alien", "Mythological", "War", "Historical", "Western", "Musical", "Dance", "Sports", "Racing", "Gambling", "Prison", "Revenge", "Superhero", "Magic", "Isekai", "Slice of Life", "Mecha", "Psychological", "Mystery", "Romance", "Family", "Documentary", "Biography", "Noir", "Neo-Noir", "Steampunk", "Folklore", "Disaster", "Parody", "Satire", "Found Footage", "Experimental", "Silent", "Reality TV", "Game Show"];

        window.onload = () => { if(localStorage.getItem('uName')) showProfileScreen(); };

        function triggerOTTAnimation(name, color) {
            const loader = document.getElementById('ottLoader');
            const lName = document.getElementById('loaderName');
            lName.innerText = name; lName.style.color = color;
            loader.style.display = 'flex';
            setTimeout(() => { loader.style.display = 'none'; loadData(); }, 2000);
        }

        async function loadData() {
            try {
                const res = await fetch(`https://docs.google.com/spreadsheets/d/${currentSheetId}/export?format=csv&gid=0&t=${Date.now()}`);
                const csv = await res.text();
                movies = csv.split(/\r?\n/).slice(1).map(r => {
                    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    const cl = (s) => s ? s.replace(/^"|"$/g, '').trim() : "";
                    return {
                        title: cl(c[0]), poster: cl(c[1]), watch: cl(c[2]), genres: cl(c[3])?.toLowerCase() || "",
                        rank: parseInt(cl(c[4])) || 99, banner: cl(c[5]) || cl(c[1]), desc: cl(c[6]) || 'Premium Content.',
                        quality: cl(c[7]) || 'HD', type: cl(c[8])?.toLowerCase() || 'movie',
                        imdb: cl(c[9]) || '8.2', cast: cl(c[10]) || 'Daksh Team', duration: cl(c[11]) || '2h',
                        director: cl(c[12]) || 'Daksh', year: cl(c[13]) || '2026', rating: cl(c[14]) || 'TV-MA', lang: cl(c[15]) || 'Hindi'
                    };
                }).filter(m => m.title);
                updateFooter(); renderUI('Home'); startBannerRotation();
            } catch(e) { console.error("Error loading data:", e); }
        }

        function switchOTT(key, color, name) {
            currentSheetId = ottConfigs[key];
            document.documentElement.style.setProperty('--accent', color);
            document.getElementById('brandName').innerText = name;
            document.getElementById('ottOverlay').style.display = 'none';
            triggerOTTAnimation(name, color);
        }

        function renderUI(tag) {
            currentTag = tag; 
            const box = document.getElementById('mainContent'); box.innerHTML = "";
            document.getElementById('masterBackBtn').style.visibility = (tag === 'Home') ? 'hidden' : 'visible';
            document.getElementById('genreList').innerHTML = genreMaster.map(g => `<div onclick="renderUI('${g}')" class="genre-item ${tag===g?'active':''}">${g}</div>`).join('');
            document.getElementById('loadMoreBtn').style.display = (tag === 'Home') ? 'none' : 'block';

            if(tag === 'Home') {
                document.getElementById('heroBanner').style.display = 'flex';
                const tMovies = movies.filter(m => m.type.includes('movie')).sort((a,b) => a.rank - b.rank).slice(0,10);
                const tShows = movies.filter(m => m.type.includes('tv') || m.type.includes('series')).sort((a,b) => a.rank - b.rank).slice(0,10);
                box.innerHTML += createRankRow("Top 10 Movies Today", tMovies);
                box.innerHTML += createRankRow("Top 10 TV Shows Today", tShows);
                if(continueWatching.length > 0) box.innerHTML += createRow("Continue Watching", continueWatching);
                genreMaster.slice(4).forEach(g => {
                    const filtered = movies.filter(m => m.genres.includes(g.toLowerCase())).slice(0,10);
                    if(filtered.length > 0) box.innerHTML += createRow(g + " Hits", filtered);
                });
            } else if(tag === 'Favorites') { displayGrid(favorites); }
            else if(tag === 'Movies') { displayGrid(movies.filter(m => m.type.includes('movie'))); }
            else if(tag === 'TV Shows') { displayGrid(movies.filter(m => m.type.includes('tv') || m.type.includes('series'))); }
            else { filterAndDisplay(); }
        }

        function createCard(m) {
            return `<div onclick="openInfo('${m.title.replace(/'/g, "\\'")}')" class="movie-card"><div class="badge duration-badge">${m.duration}</div><div class="badge quality-badge">${m.quality}</div><div class="badge imdb-badge">★ ${m.imdb}</div><img src="${m.poster}" loading="lazy"></div>`;
        }

        function createRankRow(t, d) {
            return `<div><h3 class="px-6 font-black text-zinc-500 text-[11px] uppercase mb-5 italic tracking-[3px] border-l-2 border-red-600 ml-6">${t}</h3><div class="flex overflow-x-auto gap-12 px-12 scrollbar-hide pb-4">${d.map((m,i) => `<div onclick="openInfo('${m.title.replace(/'/g, "\\'")}')" class="rank-box"><span class="rank-num">${i+1}</span><img src="${m.poster}" class="w-full aspect-[2/3] object-cover rounded-lg shadow-2xl relative z-20"></div>`).join('')}</div></div>`;
        }

        function createRow(t, d) {
            return `<div><h3 class="px-6 font-black text-zinc-500 text-[11px] uppercase mb-3 italic tracking-[3px] ml-4">${t}</h3><div class="flex overflow-x-auto gap-4 px-6 scrollbar-hide">${d.map(m => createCard(m)).join('')}</div></div>`;
        }

        function displayGrid(list) {
            document.getElementById('heroBanner').style.display = 'none';
            const chunk = list.slice(0, displayLimit);
            document.getElementById('mainContent').innerHTML = `<div class="grid grid-cols-3 gap-4 p-6">${chunk.map(m => createCard(m)).join('')}</div>`;
        }

        function filterAndDisplay() {
            let f = movies.filter(m => m.genres.includes(currentTag.toLowerCase()) || m.lang.toLowerCase().includes(currentTag.toLowerCase()));
            displayGrid(f);
        }

        function openInfo(t) {
            const m = movies.find(x => x.title === t) || favorites.find(x => x.title === t) || continueWatching.find(x => x.title === t);
            if(!m) return; currentMovie = m;
            document.getElementById('pTitle').innerText = m.title; 
            document.getElementById('pDesc').innerText = m.desc;
            document.getElementById('pYear').innerText = m.year;
            document.getElementById('pQuality').innerText = m.quality; 
            document.getElementById('pDuration').innerText = m.duration;
            document.getElementById('pLang').innerText = m.lang; 
            document.getElementById('pRating').innerText = m.rating;
            document.getElementById('infoBannerImg').src = m.banner;
            document.getElementById('infoPanel').style.display = 'block';
            document.getElementById('masterBackBtn').style.visibility = 'visible';
            document.getElementById('playBtn').onclick = () => { addToCW(m); window.open(m.watch, '_blank'); };
            const isFav = favorites.some(f => f.title === m.title);
            document.getElementById('favHeart').style.color = isFav ? '#E50914' : '#52525b';
            const recs = movies.filter(x => x.genres.includes(m.genres.split(' ')[0])).slice(0,6);
            document.getElementById('moreLikeThis').innerHTML = recs.map(r => createCard(r)).join('');
        }

        function closeAllPanels() {
            document.getElementById('infoPanel').style.display = 'none';
            if(currentTag === 'Home') document.getElementById('masterBackBtn').style.visibility = 'hidden';
            else renderUI('Home');
        }

        function increaseLimit() { displayLimit += 30; renderUI(currentTag); }

        function toggleFav() {
            const idx = favorites.findIndex(f => f.title === currentMovie.title);
            if(idx > -1) favorites.splice(idx, 1); else favorites.push(currentMovie);
            localStorage.setItem('favs', JSON.stringify(favorites));
            document.getElementById('favHeart').style.color = idx > -1 ? '#52525b' : '#E50914';
        }

        function addToCW(m) {
            continueWatching = continueWatching.filter(x => x.title !== m.title);
            continueWatching.unshift(m); if(continueWatching.length > 10) continueWatching.pop();
            localStorage.setItem('cw', JSON.stringify(continueWatching));
        }

        function startBannerRotation() {
            setInterval(() => {
                if(currentTag === 'Home' && document.getElementById('infoPanel').style.display === 'none') {
                    const m = movies[Math.floor(Math.random() * movies.length)];
                    if(m) { document.getElementById('heroBanner').style.backgroundImage = `url('${m.banner}')`; document.getElementById('bannerTitle').innerText = m.title; }
                }
            }, 30000); 
        }

        function updateFooter() {
            const name = document.getElementById('brandName').innerText;
            document.getElementById('dynamicFooter').innerHTML = `<div class="gold-shimmer text-4xl mb-6 italic font-black">${name} ELITE V31.0</div><p class="text-white font-black text-lg uppercase mb-6 tracking-[5px]">Developer Daksh Team</p><div class="text-zinc-500 text-[11px] space-y-4 uppercase tracking-[2px] mt-10 max-w-2xl mx-auto"><p>© ALL RIGHTS RESERVED BY NETZLIX ANDROID 2026</p><p class="text-[9px] leading-relaxed">DISCLAIMER: WE DO NOT HOST ANY CONTENT. ALL CONTENT COMES FROM OTHERS THIRD PARTY WEBSITES. WATCH AT YOUR OWN RISK. THIS PROJECT IS FOR EDUCATIONAL PURPOSE.</p><p class="text-red-600 font-bold">CONTACT: NETZLIXWEBPAGEE@GMAIL.COM</p></div>`;
        }

        function doLiveSearch() {
            const q = document.getElementById('liveSearchInput').value.toLowerCase();
            if(!q) return renderUI('Home');
            const r = movies.filter(m => m.title.toLowerCase().includes(q) || m.genres.includes(q));
            displayGrid(r);
        }
    </script>
</body>
</html>
